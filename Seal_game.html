<!DOCTYPE html>
<html>
<head>
  <title>Seal Game</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.2.1/dist/phaser.js"></script>
</head>
<body>
    <!-- <h1>Seal</h1> -->
<script>
  const config = {
    type: Phaser.AUTO,        // use WebGL, fall back to Canvas automatically
    width: 1920,
    height: 1080,
    physics: {
      default: 'arcade',       // simple, fast physics — good for most 2D games
      arcade: { gravity: { y: 300 }, debug: false }
    },
    scene: {
      preload: preload,
      create: create,
      update: update
    }
  };

  const game = new Phaser.Game(config);

    function preload() {
        this.load.image('snow', 'assets/Background.png');
        this.load.image('seal', 'assets/seal.png');

   }
  function create() { 
    background = this.add.image(400, 300, 'snow');  
    // seal = this.add.image(400, 300, 'seal');  
    this.seal = this.physics.add.sprite(700, 720, 'seal');

    this.fishEaten = 0;

    // fish eaten score:
    this.fishEatenText = this.add.text(100, 150, 'Fish Eaten: 0', {
    fontFamily: 'Arial',
    fontSize: '40px',
    color: 'black'
    });

    // on click, fish eaten amount increments by 1
    this.cursor = this.input.on('pointerdown', (pointer => {
        // console.log(this.fishEaten++);
        this.fishEaten++;
        this.fishEatenText.setText('Fish Eaten: ' + this.fishEaten);
    }));
    
    
    // background.setScale();
    // seal.setScale(0.5);
    background.setDisplaySize(3000, 1360);
    
    

    // this.physics.world.setBounds(0, -310, 1024, 768 + 310);
    this.physics.world.setBounds(0, 0, 1200, 800);
  }
  function update() {
    // mini jump 
    if (this.input.activePointer.isDown) {
        this.seal.setVelocityY(-100);
    } else {
        this.seal.setVelocityY(200);
    }
    this.seal.setCollideWorldBounds(true);
   }
</script>
</body>
</html>
