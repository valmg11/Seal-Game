<!DOCTYPE html>
<html>
<head>
  <title>Seal Game</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.2.1/dist/phaser.js"></script>
</head>
<body>
    <!-- <h1>Seal</h1> -->
<script>
  const config = {
    type: Phaser.AUTO,        // use WebGL, fall back to Canvas automatically
    width: 1800,
    height: 900,
    physics: {
      default: 'arcade',       // simple, fast physics — good for most 2D games
      arcade: { gravity: { y: 300 }, debug: false }
    },
    scene: {
      preload: preload,
      create: create,
      update: update
    }
  };

  const game = new Phaser.Game(config);

  function preload() {
        this.load.image('snow', '../assets/iceberg.png');
        this.load.image('seal1', '../assets/seal1.png');
        this.load.image('seal2', '../assets/seal2.png');
        this.load.image('seal3', '../assets/seal3.png');
        this.load.image('seal4', '../assets/seal4.png');
        this.load.image('fish', '../assets/Fish.png');
        this.load.image('shopBackground', '../assets/shop.png');
        this.load.image('shop', '../assets/placeholder_shop.png');
        this.load.image('fih', '../assets/fih.jpeg');
        this.load.image('exit', '../assets/exit.png');
        this.load.image('bigFih', '../assets/bigFih.png');
        this.load.image('win', '../assets/win.png');
   }
  // create function for setting up the game scene
  function create() {
  this.background = this.add.image(800, 500, 'snow');
  this.shopArrow = this.add.image(1600, 800, 'shop').setInteractive();

  this.background.setScale(0.60);
  this.background.setDisplaySize(2100, 1080);

  this.physics.world.setBounds(0, 0, 1600, 700);

  this.fishGroup = this.physics.add.group();
  this.fihGroup = this.physics.add.group();
  this.bigFihGroup = this.physics.add.group();
  this.lastFishDrop = 0;
  this.fishDropDelay = 200;

  this.fishEaten = 0;
  this.fihTrue = 0;
  this.bigFihTrue = 0;
  this.fishEatenText = this.add.text(100, 150, 'Fish Eaten: 0', {
      fontFamily: 'Arial',
      fontSize: '40px',
      color: 'black'
  });

  // create all four seal stages up front, physics-enabled, all hidden except stage 1
  this.sealStages = [
    this.physics.add.sprite(950, 700, 'seal1').setScale(0.1),
    this.physics.add.sprite(1050, 700, 'seal2').setScale(0.15),
    this.physics.add.sprite(1100, 700, 'seal3').setScale(0.2),
    this.physics.add.sprite(1150, 700, 'seal4').setScale(0.25),
  ];
  this.sealStages.forEach((s, i) => {
    s.setCollideWorldBounds(true);
    s.setVisible(i === 0);
  });
  this.seal = this.sealStages[0]; // "current" seal — everything else keeps using this.seal
  this.currentSealStage = 0;

  this.seal.setInteractive();
  this.seal.on('pointerdown', (pointer => {
    console.log("Clicked at", pointer.x, pointer.y);
    this.sealClicked = true;
    if (this.fihTrue === 0 && this.bigFihTrue === 0) {
        this.fishEaten += 1;
    } else if (this.fihTrue === 1 && this.bigFihTrue === 0) {
        this.fishEaten += 5;
    } else if (this.fihTrue === 0 && this.bigFihTrue === 1) {
        this.fishEaten += 10;
    } else if (this.fihTrue === 1 && this.bigFihTrue === 1) {
        this.fishEaten += 15;
    }
    this.fishEatenText.setText('Fish Eaten: ' + this.fishEaten);
  }));

  this.shopArrow.on('pointerdown', (pointer => {
      console.log("Shop clicked at", pointer.x, pointer.y);
      this.shopClicked = true;
  }));
}

// function to handle fish dropping
function fishDrop(time) {
  if (this.sealClicked === true && time > this.lastFishDrop && this.fihTrue === 0 && this.bigFihTrue === 0) {
    const fish = this.fishGroup.create(825, 100, 'fish');
    fish.setScale(0.1);
    fish.setVelocityY(200);

    this.lastFishDrop = time + this.fishDropDelay;
    this.sealClicked = false; // reset so it only fires once per click
  }

  this.fishGroup.getChildren().forEach((fish) => {
    if (fish.y >= 600) {
      fish.destroy();
    }
  });

if (this.sealClicked === true && time > this.lastFishDrop && this.fihTrue === 1 && this.bigFihTrue === 0) {
    const fih = this.fihGroup.create(825, 100, 'fih');
    fih.setScale(0.1);
    fih.setVelocityY(200);

    this.lastFishDrop = time + this.fishDropDelay;
    this.sealClicked = false; // reset so it only fires once per click
  }

  this.fihGroup.getChildren().forEach((fih) => {
    if (fih.y >= 550) {
      fih.destroy();
    }
  });

if (this.sealClicked === true && time > this.lastFishDrop && this.bigFihTrue === 1) {
    const bigFih = this.bigFihGroup.create(825, 100, 'bigFih');
    bigFih.setScale(0.2);
    bigFih.setVelocityY(200);

    this.lastFishDrop = time + this.fishDropDelay;
    this.sealClicked = false; // reset so it only fires once per click
  }

  this.bigFihGroup.getChildren().forEach((bigFih) => {
    if (bigFih.y >= 550) {
      bigFih.destroy();
    }
  });

}

function shopMenu() { 
  if (this.shopClicked === true) {
    this.shopBackground = this.add.image(900, 500, 'shopBackground');
    this.shopBackground.setScale(0.45);
    this.exit = this.add.image(1500, 200, 'exit').setInteractive();
    this.exit.setScale(0.2);

    this.exit.on('pointerdown', (pointer => {
        console.log("Exit clicked at", pointer.x, pointer.y);
        this.exitClicked = true;
    }));

    this.background.setVisible(false);
    this.seal.setVisible(false);
    this.shopArrow.setVisible(false);

    this.fih = this.add.image(1150, 350, 'fih').setInteractive();
    this.fih.setScale(0.5);
    if (this.fihTrue === 0) {
      this.fih.on('pointerdown', (pointer => {
          console.log("Fih clicked at", pointer.x, pointer.y);
          if (this.fishEaten >= 250) {
              this.fishEaten -= 250;
              this.fishEatenText.setText('Fish Eaten: ' + this.fishEaten);
              console.log("Fih purchased!");
              this.fih.setTint(0xaaaaaa);
              this.fihTrue = 1;
          } else {
              console.log("Not enough fish to purchase Fih.");
          }
      }));
    } else {
      this.fih.setTint(0xaaaaaa);
      this.fih.removeInteractive();
    }

    this.bigFih = this.add.image(1150, 700, 'bigFih').setInteractive();
    this.bigFih.setScale(0.45);
    if (this.bigFihTrue === 0) {
      this.bigFih.on('pointerdown', (pointer => {
          console.log("Fih clicked at", pointer.x, pointer.y);
          console.log(this.bigFihTrue);
          if (this.fishEaten >= 750) {
              this.fishEaten -= 750;
              this.fishEatenText.setText('Fish Eaten: ' + this.fishEaten);
              console.log("BIG Fih purchased!");
              this.bigFih.setTint(0xaaaaaa);
              this.bigFihTrue = 1;
          } else {
              console.log("Not enough fish to purchase Fih.");
          }
      }));
    } else {
      this.bigFih.setTint(0xaaaaaa);
      this.bigFih.removeInteractive();
    }

    this.shopClicked = false;
  }
}

function shopClose() {
  if (this.exitClicked === true) {
    this.shopBackground.setVisible(false);
    this.fih.setVisible(false);
    this.bigFih.setVisible(false);
    this.exit.setVisible(false);

    this.background.setVisible(true);
    this.seal.setVisible(true);
    this.shopArrow.setVisible(true);
  
  }
  this.exitClicked = false;
}

function updateSealStage() {
  let targetStage;
  if (this.fishEaten < 500) targetStage = 0;
  else if (this.fishEaten < 1000) targetStage = 1;
  else if (this.fishEaten < 1500) targetStage = 2;
  else targetStage = 3;

  if (targetStage !== this.currentSealStage) {
    const oldSeal = this.seal;
    oldSeal.setVisible(false);
    oldSeal.disableInteractive();

    this.currentSealStage = targetStage;
    this.seal = this.sealStages[targetStage];
    this.seal.setPosition(oldSeal.x, oldSeal.y); // keep position continuity
    this.seal.setVisible(true);
    this.seal.setInteractive();
    this.seal.on('pointerdown', (pointer => {
      this.sealClicked = true;
      if (this.fihTrue === 0 && this.bigFihTrue === 0) {
          this.fishEaten += 1;
      } else if (this.fihTrue === 1 && this.bigFihTrue === 0) {
          this.fishEaten += 5;
      } else if (this.fihTrue === 0 && this.bigFihTrue === 1) {
          this.fishEaten += 10;
      } else if (this.fihTrue === 1 && this.bigFihTrue === 1) {
          this.fishEaten += 15;
      }
      this.fishEatenText.setText('Fish Eaten: ' + this.fishEaten);
    }));
  }
}


function update(time) {
  updateSealStage.call(this);

  if (this.sealClicked === true) {
      this.seal.setVelocityY(-200);
  } else {
      this.seal.setVelocityY(100);
  }
  this.seal.setCollideWorldBounds(true);

  fishDrop.call(this, time);
  shopMenu.call(this);
  shopClose.call(this);

  if (this.fishEaten >= 2500) {
      this.add.image(900, 500, 'win').setScale(0.4);
      this.seal.setVisible(false);
      this.shopArrow.setVisible(false);
      this.fishEatenText.setVisible(false);
  }
}

</script>
</body>
</html>
